            theme: {
                extend: {
                    fontFamily: {
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }

    <style>
        /* ── same root variables & keyframes ── */
        :root {
            --bg: #08080a;
            --bg2: #111114;
            --card: #16161a;
            --card-h: #1e1e24;
            --border: #25252d;
            --text: #ececf0;
            --muted: #8b8b9e;
            --accent: #e8a820;
            --accent-h: #f0be3c;
            --accent-dim: rgba(232, 168, 32, .1);
            --success: #22c55e;
            --danger: #ef4444;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg2);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--muted);
        }
        .page-enter {
            animation: pageIn .35s ease;
        }
        @keyframes pageIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes float1 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(60px, -40px) scale(1.1);
            }
        }
        @keyframes float2 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(-50px, 30px) scale(.9);
            }
        }
        @keyframes pulse-glow {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(232, 168, 32, .1);
            }
            50% {
                box-shadow: 0 0 40px rgba(232, 168, 32, .2);
            }
        }
        @keyframes toastIn {
            from {
                transform: translateX(120%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes toastOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(120%);
                opacity: 0;
            }
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .35;
            pointer-events: none;
        }
        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            left: -100px;
            animation: float1 12s ease-in-out infinite;
        }
        .blob-2 {
            width: 350px;
            height: 350px;
            background: #b45309;
            bottom: -80px;
            right: -80px;
            animation: float2 15s ease-in-out infinite;
        }
        .btn-primary {
            background: var(--accent);
            color: #000;
            font-weight: 600;
            border: none;
            border-radius: .5rem;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
        }
        .btn-primary:hover {
            background: var(--accent-h);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: scale(.97);
        }
        .btn-outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: .5rem;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
        }
        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .btn-danger {
            background: var(--danger);
            color: #fff;
            font-weight: 600;
            border: none;
            border-radius: .5rem;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .input-field {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: .5rem;
            padding: .65rem .85rem;
            font-family: inherit;
            font-size: .875rem;
            width: 100%;
            transition: border-color .2s;
            outline: none;
        }
        .input-field:focus {
            border-color: var(--accent);
        }
        .input-field::placeholder {
            color: var(--muted);
        }
        .item-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: .75rem;
            overflow: hidden;
            transition: all .3s;
        }
        .item-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(232, 168, 32, .08);
        }
        .nav-link {
            color: var(--muted);
            font-size: .875rem;
            font-weight: 500;
            cursor: pointer;
            transition: color .2s;
            padding: .25rem 0;
            position: relative;
        }
        .nav-link:hover,
        .nav-link.active {
            color: var(--accent);
        }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent);
            border-radius: 1px;
        }
        #chat-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 420px;
            max-width: 100vw;
            background: var(--bg2);
            border-left: 1px solid var(--border);
            z-index: 60;
            transform: translateX(100%);
            transition: transform .3s ease;
            display: flex;
            flex-direction: column;
        }
        #chat-panel.open {
            transform: translateX(0);
        }
        #chat-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .5);
            z-index: 55;
            display: none;
        }
        #chat-overlay.open {
            display: block;
        }
        .toast {
            animation: toastIn .3s ease forwards;
            padding: .75rem 1rem;
            border-radius: .5rem;
            font-size: .85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: .5rem;
            max-width: 360px;
            backdrop-filter: blur(12px);
        }
        .toast.removing {
            animation: toastOut .3s ease forwards;
        }
        .toast-success {
            background: rgba(34, 197, 94, .15);
            border: 1px solid rgba(34, 197, 94, .3);
            color: var(--success);
        }
        .toast-error {
            background: rgba(239, 68, 68, .15);
            border: 1px solid rgba(239, 68, 68, .3);
            color: var(--danger);
        }
        .toast-info {
            background: rgba(232, 168, 32, .15);
            border: 1px solid rgba(232, 168, 32, .3);
            color: var(--accent);
        }
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(4px);
            z-index: 70;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 1rem;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: pageIn .25s ease;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: .75rem;
            padding: 1.25rem;
            text-align: center;
        }
        .step-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: .8rem;
            flex-shrink: 0;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            padding: .15rem .5rem;
            border-radius: 9999px;
            font-size: .7rem;
            font-weight: 600;
        }
        .badge-pending {
            background: rgba(232, 168, 32, .15);
            color: var(--accent);
        }
        .badge-completed {
            background: rgba(34, 197, 94, .15);
            color: var(--success);
        }
        .badge-chatting {
            background: rgba(56, 189, 248, .15);
            color: #38bdf8;
        }
        @media(max-width:640px) {
            #chat-panel {
                width: 100%;
            }
            .hero-title {
                font-size: 2rem !important;
            }
        }

        /* spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Admin table */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: .8rem;
        }
        .admin-table th {
            background: var(--bg2);
            color: var(--muted);
            font-weight: 600;
            text-align: left;
            padding: .5rem .75rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .admin-table td {
            padding: .5rem .75rem;
            border-bottom: 1px solid var(--border);
            vertical-align: top;
        }
        .admin-table tr:hover td {
            background: rgba(232, 168, 32, .05);
        }
        .admin-container {
            max-height: 500px;
            overflow-y: auto;
        }
        .admin-tabs {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .admin-tab {
            padding: .4rem 1rem;
            border-radius: 9999px;
            cursor: pointer;
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: .8rem;
            transition: all .2s;
        }
        .admin-tab.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }
        .admin-tab:hover:not(.active) {
            border-color: var(--accent);
            color: var(--text);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav id="navbar" class="fixed top-0 left-0 right-0 z-50 border-b border-[var(--border)]" style="background:rgba(8,8,10,.85);backdrop-filter:blur(16px)">

    <script>

            );

        /* ======================================================
               HELPERS
               ====================================================== */
        function genId() { return Math.random().toString(36).substr(2, 9) + Date.now().toString(36); }

        function getItemImage(id) {
            return `https://roblox.com/asset-thumbnail/image?assetId=${id}&width=420&height=420&format=png`;
        }

        function formatRap(r) { return 'R$ ' + Number(r).toLocaleString(); }

        function formatCoins(c) { return '$' + Number(c).toLocaleString(); }

        function timeAgo(ts) {
            const s = Math.floor((Date.now() - ts) / 1000);
            if (s < 60) return 'just now';
            if (s < 3600) return Math.floor(s / 60) + 'm ago';
            if (s < 86400) return Math.floor(s / 3600) + 'h ago';
            return Math.floor(s / 86400) + 'd ago';
        }

        function generatePhrase() {
            const w = ['Alpha', 'Bravo', 'Vault', 'Verify', 'Gold', 'Prime', 'Nova', 'Flux', 'Pixel', 'Crest'];
            return w[Math.floor(Math.random() * w.length)] + '-' + Math.floor(1000 + Math.random() * 9000);
        }

        function escHtml(s) { const d = document.createElement('div');
            d.textContent = s; return d.innerHTML; }

        function toast(msg, type = 'info') {
            const c = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `toast toast-${type}`;
            const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle' };
            el.innerHTML = `<i class="fas ${icons[type]||icons.info}"></i><span>${msg}</span>`;
            c.appendChild(el);
            setTimeout(() => { el.classList.add('removing');
                setTimeout(() => el.remove(), 300) }, 3500);
        }

        /* ======================================================
               STATE
               ====================================================== */
        const state = {
            page: 'home',
            user: null, // Firestore user doc data + auth uid
            authUser: null, // Firebase Auth User
            admin: false, // admin flag
            verifyStep: 0,
            verifyPhrase: '',
            verifyUsername: '',
            chatTradeId: null,
            chatUnsub: null,
            marketUnsub: null,
            invUnsub: null,
            tradesUnsub: null,
            wdUnsub: null,
            loading: false
        };

        /* ======================================================
               FIREBASE AUTH
               ====================================================== */
        auth.onAuthStateChanged(async (fbUser) => {
            state.authUser = fbUser;
            if (fbUser) {
                // fetch user doc from Firestore
                try {
                    const doc = await db.collection('users').doc(fbUser.uid).get();
                    if (doc.exists) {
                        state.user = { id: fbUser.uid, ...doc.data() };
                    } else {
                        // fallback: create minimal doc
                        const newUser = {
                            username: fbUser.displayName || fbUser.email?.split('@')[0] || 'User',
                            email: fbUser.email || '',
                            robloxUsername: '',
                            robloxUserId: 0,
                            verified: false,
                            balance: 0,
                            createdAt: Date.now()
                        };
                        await db.collection('users').doc(fbUser.uid).set(newUser);
                        state.user = { id: fbUser.uid, ...newUser };
                    }
                    render();
                } catch (e) {
                    console.error('Error fetching user doc:', e);
                    toast('Error loading profile', 'error');
                }
            } else {
                state.user = null;
                // close any listeners
                if (state.chatUnsub) { state.chatUnsub();
                    state.chatUnsub = null; }
                if (state.marketUnsub) { state.marketUnsub();
                    state.marketUnsub = null; }
                if (state.invUnsub) { state.invUnsub();
                    state.invUnsub = null; }
                if (state.tradesUnsub) { state.tradesUnsub();
                    state.tradesUnsub = null; }
                if (state.wdUnsub) { state.wdUnsub();
                    state.wdUnsub = null; }
                closeChat();
                render();
            }
        });

        /* ======================================================
               ADMIN LOGIN
               ====================================================== */
        function adminLogin(password) {
            if (password === ADMIN_PASSWORD) {
                state.admin = true;
                toast('Admin logged in', 'success');
                navigate('admin');
            } else {
                toast('Wrong password', 'error');
            }
        }

        function adminLogout() {
            state.admin = false;
            toast('Admin logged out', 'info');
            navigate('home');
        }

        /* ======================================================
               AUTH FUNCTIONS (Firebase)
               ====================================================== */
        async function register(uname, email, pw) {
            if (!uname.trim()) return toast('Username is required', 'error');
            if (!email.trim()) return toast('Email is required', 'error');
            if (pw.length < 6) return toast('Password must be at least 6 characters', 'error');

            state.loading = true;
            render();

            try {
                // 1) create auth user
                const cred = await auth.createUserWithEmailAndPassword(email, pw);
                const uid = cred.user.uid;

                // 2) create user doc in Firestore
                const userData = {
                    username: uname.trim(),
                    email: email.trim(),
                    robloxUsername: '',
                    robloxUserId: 0,
                    verified: false,
                    balance: 0,
                    createdAt: Date.now()
                };
                await db.collection('users').doc(uid).set(userData);

                // 3) update displayName
                await cred.user.updateProfile({ displayName: uname.trim() });

                state.user = { id: uid, ...userData };
                toast('Account created successfully!', 'success');
                navigate('dashboard');
            } catch (err) {
                console.error('Register error:', err);
                toast(err.message || 'Registration failed', 'error');
            }
            state.loading = false;
            render();
        }

        async function login(email, pw) {
            if (!email.trim() || !pw) return toast('Email and password required', 'error');
            state.loading = true;
            render();
            try {
                await auth.signInWithEmailAndPassword(email, pw);
                toast('Welcome back!', 'success');
                navigate('dashboard');
            } catch (err) {
                console.error('Login error:', err);
                toast(err.message || 'Login failed', 'error');
            }
            state.loading = false;
            render();
        }

        async function logout() {
            state.loading = true;
            render();
            try {
                await auth.signOut();
                state.user = null;
                state.authUser = null;
                closeChat();
                toast('Logged out', 'info');
                navigate('home');
            } catch (err) {
                toast('Logout error', 'error');
            }
            state.loading = false;
            render();
        }

        /* ======================================================
               FIREBASE DATA HELPERS
               ====================================================== */
        function getUserRef() { return state.user ? db.collection('users').doc(state.user.id) : null; }

        async function updateUser(updates) {
            if (!state.user) return;
            try {
                await db.collection('users').doc(state.user.id).update(updates);
                // update local state
                Object.assign(state.user, updates);
            } catch (e) {
                console.error('Update user error:', e);
                throw e;
            }
        }

        /* ======================================================
               ROBLOX VERIFICATION (REAL API)
               ====================================================== */
        async function startVerify(rbxF) {
            if (!rbxF.trim()) return toast('Enter your Roblox username', 'error');

            state.verifyPhrase = generatePhrase();
            state.verifyStep = 1;
            render();
        }

        async function completeVerify() {
            if (!state.user) return toast('Not logged in', 'error');
            if (!state.verifyUsername) return toast('No username set', 'error');

            try {
                // 1) Get Roblox user ID from username
                const userRes = await fetch(`https://api.roblox.com/users/get-by-username?username=${encodeURIComponent(state.verifyUsername)}`);
                if (!userRes.ok) throw new Error('Failed to fetch Roblox user');
                const userData = await userRes.json();
                if (!userData || !userData.Id) throw new Error('User not found');
                const robloxUserId = userData.Id;

                // 2) Get user profile description (bio)
                const profileRes = await fetch(`https://users.roblox.com/v1/users/${robloxUserId}`);
                if (!profileRes.ok) throw new Error('Failed to fetch profile');
                const profileData = await profileRes.json();
                const bio = profileData.description || '';

                // 3) Check if bio contains the phrase
                if (!bio.includes(state.verifyPhrase)) {
                    toast('Bio does not contain the phrase. Make sure you added it and your profile is public.', 'error');
                    return;
                }

                // 4) Mark user as verified
                await updateUser({
                    robloxUsername: state.verifyUsername,
                    robloxUserId: robloxUserId,
                    verified: true
                });

                // 5) Fetch inventory from Rolimons and import
                await importRolimonsInventory(robloxUserId);

                state.verifyStep = 0;
                toast('Roblox account verified! Inventory imported from Rolimons.', 'success');
                navigate('inventory');
            } catch (err) {
                console.error('Verification error:', err);
                toast(err.message || 'Verification failed', 'error');
            }
        }

        async function importRolimonsInventory(robloxUserId) {
            try {
                // Fetch from Rolimons API
                const res = await fetch(`https://www.rolimons.com/api/player/${robloxUserId}`);
                if (!res.ok) throw new Error('Rolimons API error');
                const data = await res.json();

                // data is expected to have an "items" object { assetId: quantity, ... }
                // We only care about asset IDs that exist in our LIMITEDS_DB
                const roliItems = data.items || {};
                const assetIds = Object.keys(roliItems).map(Number);

                // Filter to only those in our DB
                const validAssetIds = assetIds.filter(id => LIMITEDS_DB[id]);

                if (validAssetIds.length === 0) {
                    toast('No supported limiteds found in your inventory.', 'info');
                    return;
                }

                // Get current inventory to avoid duplicates
                const existingSnap = await db.collection('inventory')
                    .where('userId', '==', state.user.id)
                    .get();
                const existingAssetIds = new Set();
                existingSnap.forEach(doc => {
                    existingAssetIds.add(doc.data().assetId);
                });

                const batch = db.batch();
                let addedCount = 0;
                for (const assetId of validAssetIds) {
                    if (existingAssetIds.has(assetId)) continue;
                    const ref = db.collection('inventory').doc();
                    batch.set(ref, {
                        userId: state.user.id,
                        assetId: assetId,
                        serial: Math.floor(1000 + Math.random() * 30000), // Rolimons doesn't provide serial, so generate random
                        listed: false,
                        listingId: null
                    });
                    addedCount++;
                }

                if (addedCount > 0) {
                    await batch.commit();
                    toast(`Imported ${addedCount} new limiteds from Rolimons.`, 'success');
                } else {
                    toast('No new limiteds to import.', 'info');
                }
            } catch (err) {
                console.error('Rolimons import error:', err);
                toast('Could not import inventory from Rolimons.', 'error');
            }
        }

        async function createListing(assetId, price) {
            price = parseFloat(price);
            if (!price || price < 1) return toast('Price must be at least 1 coin', 'error');
            if (!state.user) return toast('Not logged in', 'error');

            // find unlisted item in inventory
            const snap = await db.collection('inventory')
                .where('userId', '==', state.user.id)
                .where('assetId', '==', assetId)
                .where('listed', '==', false)
                .limit(1)
                .get();
            if (snap.empty) return toast('Item not found in your inventory', 'error');
            const itemDoc = snap.docs[0];
            const itemData = itemDoc.data();

            // create listing
            const listingRef = db.collection('listings').doc();
            const listingData = {
                sellerId: state.user.id,
                assetId,
                price,
                serial: itemData.serial,
                createdAt: Date.now()
            };
            await listingRef.set(listingData);

            // update inventory item
            await db.collection('inventory').doc(itemDoc.id).update({
                listed: true,
                listingId: listingRef.id
            });

            toast('Item listed for ' + formatCoins(price), 'success');
            closeModal();
            render();
        }

        async function cancelListing(listingId) {
            if (!state.user) return toast('Not logged in', 'error');
            // find listing
            const listingSnap = await db.collection('listings').doc(listingId).get();
            if (!listingSnap.exists) return toast('Listing not found', 'error');
            const listing = listingSnap.data();
            if (listing.sellerId !== state.user.id) return toast('Unauthorized', 'error');

            // find inventory item with this listingId
            const invSnap = await db.collection('inventory')
                .where('listingId', '==', listingId)
                .limit(1)
                .get();
            if (!invSnap.empty) {
                await db.collection('inventory').doc(invSnap.docs[0].id).update({
                    listed: false,
                    listingId: null
                });
            }
            await db.collection('listings').doc(listingId).delete();
            toast('Listing cancelled', 'info');
            render();
        }

        // Get marketplace listings with seller info (real‑time)
        function listenMarketplace(cb) {
            if (state.marketUnsub) { state.marketUnsub();
                state.marketUnsub = null; }
            state.marketUnsub = db.collection('listings')
                .orderBy('createdAt', 'desc')
                .onSnapshot(async (snap) => {
                    const listings = [];
                    const sellerIds = new Set();
                    snap.forEach(d => {
                        const data = d.data();
                        listings.push({ id: d.id, ...data });
                        sellerIds.add(data.sellerId);
                    });
                    // fetch seller usernames
                    const usersMap = {};
                    if (sellerIds.size) {
                        const userSnap = await db.collection('users')
                            .where(firebase.firestore.FieldPath.documentId(), 'in', [...sellerIds])
                            .get();
                        userSnap.forEach(d => { usersMap[d.id] = d.data().username || 'Unknown'; });
                    }
                    const enriched = listings.map(l => ({
                        ...l,
                        sellerName: usersMap[l.sellerId] || 'Unknown',
                        name: LIMITEDS_DB[l.assetId]?.name || 'Unknown Item',
                        rap: LIMITEDS_DB[l.assetId]?.rap || 0
                    }));
                    if (cb) cb(enriched);
                }, (err) => {
                    console.error('Marketplace listener error:', err);
                });
        }

        /* ======================================================
               BUY / TRADES (Firestore)
               ====================================================== */
        async function buyItem(listingId) {
            if (!state.user) return toast('Please login first', 'error');
            state.loading = true;
            render();

            try {
                // get listing
                const listingSnap = await db.collection('listings').doc(listingId).get();
                if (!listingSnap.exists) return toast('Listing not found', 'error');
                const listing = listingSnap.data();
                if (listing.sellerId === state.user.id) return toast("You can't buy your own item", 'error');

                // check balance
                if (state.user.balance < listing.price) {
                    toast('Insufficient balance. Please deposit coins.', 'error');
                    state.loading = false;
                    render();
                    return;
                }

                // deduct balance
                await db.collection('users').doc(state.user.id).update({
                    balance: firebase.firestore.FieldValue.increment(-listing.price)
                });
                state.user.balance -= listing.price;

                // delete listing
                await db.collection('listings').doc(listingId).delete();

                // update inventory (find item with listingId)
                const invSnap = await db.collection('inventory')
                    .where('listingId', '==', listingId)
                    .limit(1)
                    .get();
                if (!invSnap.empty) {
                    await db.collection('inventory').doc(invSnap.docs[0].id).update({
                        listed: false,
                        listingId: null
                    });
                }

                // create trade
                const tradeRef = db.collection('trades').doc();
                const tradeData = {
                    listingId,
                    assetId: listing.assetId,
                    name: LIMITEDS_DB[listing.assetId]?.name || 'Item',
                    serial: listing.serial,
                    price: listing.price,
                    buyerId: state.user.id,
                    sellerId: listing.sellerId,
                    status: 'chatting',
                    createdAt: Date.now()
                };
                await tradeRef.set(tradeData);

                // system message
                const msgRef = db.collection('messages').doc();
                await msgRef.set({
                    tradeId: tradeRef.id,
                    from: 'system',
                    text: 'Trade started! Buyer, please send your Roblox username to the seller.',
                    ts: Date.now()
                });

                // Record transaction (purchase)
                await db.collection('transactions').add({
                    userId: state.user.id,
                    type: 'purchase',
                    amount: -listing.price,
                    itemName: LIMITEDS_DB[listing.assetId]?.name || 'Item',
                    tradeId: tradeRef.id,
                    counterpartyId: listing.sellerId,
                    createdAt: Date.now()
                });

                toast('Purchase successful! Chat opened.', 'success');
                openChat(tradeRef.id);
            } catch (err) {
                console.error('Buy error:', err);
                toast('Purchase failed', 'error');
            }
            state.loading = false;
            render();
        }

        async function releaseTrade(tradeId) {
            if (!state.user) return toast('Not logged in', 'error');
            const tradeSnap = await db.collection('trades').doc(tradeId).get();
            if (!tradeSnap.exists) return toast('Trade not found', 'error');
            const trade = tradeSnap.data();
            if (trade.buyerId !== state.user.id) return toast('Unauthorized', 'error');
            if (trade.status !== 'chatting') return toast('Trade already completed', 'error');

            // update trade status
            await db.collection('trades').doc(tradeId).update({ status: 'completed' });

            // credit seller
            await db.collection('users').doc(trade.sellerId).update({
                balance: firebase.firestore.FieldValue.increment(trade.price)
            });

            // Record transaction for seller (sale)
            await db.collection('transactions').add({
                userId: trade.sellerId,
                type: 'sale',
                amount: trade.price,
                itemName: trade.name || 'Item',
                tradeId: tradeId,
                counterpartyId: trade.buyerId,
                createdAt: Date.now()
            });

            // system message
            const msgRef = db.collection('messages').doc();
            await msgRef.set({
                tradeId: tradeId,
                from: 'system',
                text: 'Payment released! ' + formatCoins(trade.price) + ' has been added to the seller\'s balance.',
                ts: Date.now()
            });

            toast('Payment released to seller', 'success');
            renderChat();
        }

            state.chatTradeId = null;

            document.getElementById('chat-overlay').classList.remove('open');

        async function sendChatMsg(text) {
            if (!text.trim() || !state.chatTradeId || !state.user) return;
            try {
                await db.collection('messages').add({
                    tradeId: state.chatTradeId,
                    from: state.user.id,
                    text: text.trim(),
                    ts: Date.now()
                });
                // input cleared by caller
            } catch (err) {
                toast('Failed to send message', 'error');
            }
        }

        async function renderChat() {
            if (!state.chatTradeId) return;
            // get trade info
            const tradeSnap = await db.collection('trades').doc(state.chatTradeId).get();
            if (!tradeSnap.exists) return;
            const trade = tradeSnap.data();
            const info = LIMITEDS_DB[trade.assetId] || { name: 'Item' };

            // other user
            const otherId = trade.buyerId === state.user.id ? trade.sellerId : trade.buyerId;
            let otherName = 'User';
            try {
                const otherSnap = await db.collection('users').doc(otherId).get();
                if (otherSnap.exists) otherName = otherSnap.data().username || 'User';
            } catch (e) {}

            // header
            document.getElementById('chat-header').innerHTML = `
                <button onclick="closeChat()" class="text-[var(--muted)] hover:text-[var(--text)] transition-colors"><i class="fas fa-arrow-left"></i></button>
                <img src="${getItemImage(trade.assetId)}" class="w-9 h-9 rounded-lg object-cover" onerror="this.src='${PLACEHOLDER_IMG}'">
                <div class="flex-1 min-w-0">
                    <div class="font-semibold text-sm truncate">${info.name} <span class="text-[var(--muted)]">#${trade.serial}</span></div>
                    <div class="text-xs text-[var(--muted)]">Chat with ${otherName}</div>
                </div>
                <span class="badge ${trade.status==='chatting'?'badge-chatting':'badge-completed'}">${trade.status==='chatting'?'In Trade':'Completed'}</span>
            `;

            // messages
            const msgsSnap = await db.collection('messages')
                .where('tradeId', '==', state.chatTradeId)
                .orderBy('ts', 'asc')
                .get();
            const msgs = [];
            msgsSnap.forEach(d => msgs.push({ id: d.id, ...d.data() }));

            const msgHtml = msgs.map(m => {
                if (m.from === 'system') {
                    return `<div class="text-center text-xs text-[var(--muted)] bg-[var(--accent-dim)] rounded-lg py-2 px-3">${escHtml(m.text)}</div>`;
                }
                const isMe = m.from === state.user.id;
                return `<div class="flex ${isMe?'justify-end':'justify-start'}">
                    <div class="max-w-[75%] ${isMe?'bg-[var(--accent)] text-black':'bg-[var(--card)] border border-[var(--border)]'} rounded-xl px-3.5 py-2.5 text-sm">
                        <div>${escHtml(m.text)}</div>
                        <div class="text-[10px] ${isMe?'text-black/50':'text-[var(--muted)]'} mt-1">${timeAgo(m.ts)}</div>
                    </div>
                </div>`;
            }).join('');

            const mc = document.getElementById('chat-messages');
            mc.innerHTML = msgHtml || '<div class="flex-1 flex items-center justify-center text-[var(--muted)] text-sm">No messages yet</div>';
            mc.scrollTop = mc.scrollHeight;

            // input
            const isBuyer = trade.buyerId === state.user.id;
            const showRelease = isBuyer && trade.status === 'chatting';
            document.getElementById('chat-input-area').innerHTML = `
                ${showRelease?`<button onclick="releaseTrade('${state.chatTradeId}')" class="btn-primary text-xs px-3 py-2 whitespace-nowrap" style="background:var(--success)"><i class="fas fa-check mr-1"></i>Release</button>`:''}
                <input type="text" id="chat-input" class="input-field flex-1" placeholder="Type a message..." onkeydown="if(event.key==='Enter'){const v=this.value;sendChatMsg(v);this.value=''}">
                <button onclick="const i=document.getElementById('chat-input');sendChatMsg(i.value);i.value=''" class="btn-primary px-3 py-2"><i class="fas fa-paper-plane text-sm"></i></button>
            `;
        }

        async function requestWithdraw(amount, address) {
            amount = parseFloat(amount);
            address = address.trim();
            if (!amount || amount < 10) return toast('Minimum withdrawal is 10 coins', 'error');
            if (!state.user) return toast('Not logged in', 'error');
            if (amount > state.user.balance) return toast('Insufficient balance', 'error');
            if (!address) return toast('Enter a crypto address', 'error');

            try {
                // deduct balance
                await db.collection('users').doc(state.user.id).update({
                    balance: firebase.firestore.FieldValue.increment(-amount)
                });
                state.user.balance -= amount;

                // create withdrawal
                const wdRef = db.collection('withdrawals').doc();
                const wdData = {
                    userId: state.user.id,
                    username: state.user.username,
                    amount,
                    address,
                    status: 'pending',
                    createdAt: Date.now()
                };
                await wdRef.set(wdData);

                // Record withdrawal transaction
                await db.collection('transactions').add({
                    userId: state.user.id,
                    type: 'withdrawal',
                    amount: -amount,
                    address: address,
                    status: 'pending',
                    createdAt: Date.now()
                });

                // Discord webhook
                sendDiscordWebhook(wdData);

                toast('Withdrawal request submitted', 'success');
                closeModal();
                render();
            } catch (e) {
                toast('Withdrawal failed', 'error');
            }
        }

        async function sendDiscordWebhook(w) {
            if (DISCORD_WEBHOOK_URL === 'YOUR_DISCORD_WEBHOOK_URL_HERE') {
                console.log('Withdrawal request (no webhook):', w);
                return;
            }
            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        embeds: [{
                            title: 'New Withdrawal Request',
                            color: 0xe8a820,
                            fields: [
                                { name: 'User', value: w.username, inline: true },
                                { name: 'Amount', value: '$' + w.amount, inline: true },
                                { name: 'Address', value: '`' + w.address + '`', inline: false },
                                { name: 'Status', value: 'Pending', inline: true },
                                { name: 'Date', value: new Date().toLocaleString(), inline: true }
                            ],
                            footer: { text: 'LimitedVault' },
                            timestamp: new Date().toISOString()
                        }]
                    })
                });
            } catch (e) { console.error('Webhook error:', e); }
        }

            const snap = await db.collection('transactions')
                .where('userId', '==', state.user.id)
                .orderBy('createdAt', 'desc')
                .get();

            const txs = [];
            snap.forEach(d => txs.push({ id: d.id, ...d.data() }));

            if (txs.length === 0) {
                return `<div class="page-enter max-w-5xl mx-auto px-4 py-12">
                    <h1 class="text-2xl font-bold mb-8">Transaction History</h1>
                    <div class="text-center py-20 text-[var(--muted)]">
                        <i class="fas fa-receipt text-4xl mb-4 block opacity-30"></i>

            let html = `<div class="page-enter max-w-5xl mx-auto px-4 py-12">
                <h1 class="text-2xl font-bold mb-8">Transaction History</h1>
                <div class="bg-[var(--card)] border border-[var(--border)] rounded-xl overflow-hidden">
                    <table class="admin-table">
                        <thead><tr>
                            <th>Type</th>
                            <th>Amount</th>
                            <th>Details</th>
                            <th>Date</th>
                        </tr></thead>
                        <tbody>`;

            for (const tx of txs) {
                let typeLabel = tx.type;
                let typeColor = '';
                let detail = '';

                switch (tx.type) {
                    case 'purchase':
                        typeLabel = '🛒 Purchase';
                        typeColor = 'color:var(--danger)';
                        detail = `Bought ${tx.itemName || 'item'}`;
                        break;
                    case 'sale':
                        typeLabel = '💰 Sale';
                        typeColor = 'color:var(--success)';
                        detail = `Sold ${tx.itemName || 'item'}`;
                        break;
                    case 'deposit':
                        typeLabel = '📥 Deposit';
                        typeColor = 'color:var(--accent)';
                        detail = `Deposited ${formatCoins(tx.amount)}`;
                        break;
                    case 'withdrawal':
                        typeLabel = '📤 Withdrawal';
                        typeColor = 'color:var(--danger)';
                        detail = `Withdrew ${formatCoins(Math.abs(tx.amount))} to ${tx.address ? tx.address.slice(0,10)+'…' : ''}`;
                        break;
                    default:
                        typeLabel = tx.type;
                }

                html += `<tr>
                    <td style="${typeColor} font-weight:600">${typeLabel}</td>
                    <td style="${tx.amount > 0 ? 'color:var(--success)' : 'color:var(--danger)'}">${formatCoins(tx.amount)}</td>
                    <td>${escHtml(detail)}</td>
                    <td class="text-xs">${tx.createdAt ? new Date(tx.createdAt).toLocaleString() : '-'}</td>
                </tr>`;
            }

            html += `</tbody></table></div>
                <p class="text-xs text-[var(--muted)] mt-4">Total: ${txs.length} transactions</p>
            </div>`;

            return html;
        }

            const renderWithdrawals = () => `

            const renderTrades = () => `

            const renderMessages = () => `
                <div class="admin-container">
                    <table class="admin-table">
                        <thead><tr><th>Trade ID</th><th>From</th><th>Message</th><th>Timestamp</th></tr></thead>
                        <tbody>

                                <td class="font-mono text-xs">${m.tradeId?.slice(0,8)||''}</td>
                                <td>${m.from === 'system' ? '🔔 System' : escHtml(m.from?.slice(0,8)||'')}</td>

                        <tbody>
                            ${transactions.map(tx => `<tr>

            return `<div class="page-enter max-w-7xl mx-auto px-4 py-8">

                </div>
                <div class="admin-tabs">
                    ${Object.keys(tabContent).map(key => `
                        <span class="admin-tab ${adminTab===key?'active':''}" onclick="adminTab='${key}';render()">${key.charAt(0).toUpperCase()+key.slice(1)}</span>
                    `).join('')}
                </div>
                <div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-4">
                    ${tabContent[adminTab]()}
                </div>
            </div>`;
        }

            if (!state.user) return renderAuth('login');
            return `<div class="page-enter max-w-4xl mx-auto px-4 py-8">
                <h1 class="text-2xl font-bold mb-8">Wallet</h1>
                <div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-6 mb-6 text-center" style="animation:pulse-glow 4s infinite">
                    <p class="text-sm text-[var(--muted)] mb-2">Available Balance</p>
                    <div class="text-4xl font-extrabold" style="color:var(--accent)">${formatCoins(state.user.balance)}</div>
                    <p class="text-xs text-[var(--muted)] mt-2">1 Coin = $1 USD</p>
                </div>
                <div class="grid md:grid-cols-2 gap-4 mb-8">
                    <div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-5">
                        <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fas fa-arrow-down" style="color:var(--success)"></i> Deposit Coins</h3>
                        <p class="text-xs text-[var(--muted)] mb-4">Send crypto to the address below. Funds will be credited after confirmation.</p>
                        <div class="space-y-3 mb-4">
                            ${Object.entries(CRYPTO_ADDRESSES).map(([k,v])=>`<div class="bg-[var(--bg2)] rounded-lg p-3">
                                <div class="flex items-center justify-between mb-1"><span class="text-xs font-semibold">${k}</span><button onclick="navigator.clipboard.writeText('${v}');toast('Address copied','success')" class="text-xs text-[var(--accent)] hover:underline"><i class="fas fa-copy mr-1"></i>Copy</button></div>
                                <code class="text-[10px] text-[var(--muted)] font-mono break-all">${v}</code>
                            </div>`).join('')}
                        </div>
                        <div class="bg-[var(--accent-dim)] border border-[rgba(232,168,32,.2)] rounded-lg p-3 mb-4">
                            <p class="text-xs text-[var(--accent)]"><i class="fas fa-info-circle mr-1"></i>Demo mode: Use the button below to simulate a deposit.</p>
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="deposit-amount" class="input-field flex-1" placeholder="Amount" min="1">
                            <button onclick="simulateDeposit(document.getElementById('deposit-amount').value)" class="btn-primary px-4 py-2 text-sm">Deposit</button>
                        </div>
                    </div>
                    <div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-5">
                        <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fas fa-arrow-up" style="color:var(--danger)"></i> Withdraw Coins</h3>
                        <p class="text-xs text-[var(--muted)] mb-4">Minimum withdrawal: 10 coins. Requests are processed manually.</p>
                        <div class="mb-3"><label class="text-xs text-[var(--muted)] block mb-1">Amount (Coins)</label>
                        <input type="number" id="wd-amount" class="input-field" placeholder="e.g. 100" min="10" max="${state.user.balance}"></div>
                        <div class="mb-4"><label class="text-xs text-[var(--muted)] block mb-1">Crypto Address</label>
                        <input type="text" id="wd-addr" class="input-field" placeholder="Enter your crypto address"></div>
                        <div class="mb-4"><label class="text-xs text-[var(--muted)] block mb-1">Network</label>
                        <select id="wd-network" class="input-field"><option>BTC</option><option>ETH</option><option>LTC</option></select></div>
                        <button onclick="requestWithdraw(document.getElementById('wd-amount').value,document.getElementById('wd-addr').value)" class="btn-danger w-full py-2.5 text-sm">Request Withdrawal</button>
                    </div>
                </div>
                <div id="wd-history"><p class="text-sm text-[var(--muted)]">Loading withdrawal history...</p></div>
            </div>`;
        }

        function renderTrades() {
            if (!state.user) return renderAuth('login');
            return `<div class="page-enter max-w-5xl mx-auto px-4 py-8">
                <h1 class="text-2xl font-bold mb-8">My Trades</h1>
                <div id="trades-list"><p class="text-sm text-[var(--muted)]">Loading trades...</p></div>
            </div>`;
        }

        function renderProfile() {
            if (!state.user) return renderAuth('login');
            return `<div class="page-enter max-w-2xl mx-auto px-4 py-8">
                <h1 class="text-2xl font-bold mb-8">Profile</h1>
                <div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-6 mb-6">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="w-16 h-16 rounded-full flex items-center justify-center text-2xl font-bold" style="background:var(--accent-dim);color:var(--accent)">${state.user.username.charAt(0).toUpperCase()}</div>
                        <div><h2 class="text-xl font-bold">${state.user.username}</h2>
                        <p class="text-sm text-[var(--muted)]">${state.user.email}</p>
                        ${state.user.verified?`<span class="badge badge-completed mt-1"><i class="fas fa-check mr-1"></i>Roblox Verified</span>`:`<span class="badge badge-pending mt-1">Not Verified</span>`}</div>
                    </div>
                    ${state.user.verified?`<div class="grid grid-cols-2 gap-4">
                        <div class="bg-[var(--bg2)] rounded-lg p-3"><p class="text-xs text-[var(--muted)]">Roblox Username</p><p class="font-semibold text-sm mt-1">${state.user.robloxUsername}</p></div>
                        <div class="bg-[var(--bg2)] rounded-lg p-3"><p class="text-xs text-[var(--muted)]">User ID</p><p class="font-semibold text-sm mt-1 font-mono">${state.user.robloxUserId}</p></div>
                        <div class="bg-[var(--bg2)] rounded-lg p-3"><p class="text-xs text-[var(--muted)]">Balance</p><p class="font-semibold text-sm mt-1" style="color:var(--accent)">${formatCoins(state.user.balance)}</p></div>
                        <div class="bg-[var(--bg2)] rounded-lg p-3"><p class="text-xs text-[var(--muted)]">Member Since</p><p class="font-semibold text-sm mt-1">${new Date(state.user.createdAt).toLocaleDateString()}</p></div>
                    </div>
                    <div class="mt-4 flex gap-3">
                        <a href="https://www.roblox.com/users/${state.user.robloxUserId}/profile" target="_blank" class="btn-outline px-4 py-2 text-xs flex-1 text-center"><i class="fas fa-external-link-alt mr-1"></i>Roblox Profile</a>
                        <a href="https://www.rolimons.com/player/${state.user.robloxUserId}" target="_blank" class="btn-outline px-4 py-2 text-xs flex-1 text-center"><i class="fas fa-external-link-alt mr-1"></i>Rolimons</a>
                    </div>`:`<p class="text-sm text-[var(--muted)]">Verify your Roblox account to see your profile details.</p>`}
                </div>
                <button onclick="logout()" class="btn-danger w-full py-3 text-sm"><i class="fas fa-sign-out-alt mr-2"></i>Log Out</button>
            </div>`;
        }

        /* ======================================================
               FILTER MARKETPLACE (client-side)
               ====================================================== */
        let lastMarketData = [];

        function filterMarketplace(q) {
            q = q.toLowerCase().trim();
            const grid = document.getElementById('market-grid');
            if (!grid) return;
            const filtered = q ? lastMarketData.filter(l => l.name.toLowerCase().includes(q)) : lastMarketData;
            grid.innerHTML = filtered.length ? filtered.map(l => itemCard(l, { showBuy: true, showSeller: true })).join('') :
                `<div class="col-span-full text-center py-20 text-[var(--muted)]"><p>No items found matching "${q}"</p></div>`;
        }

        /* ======================================================
               NAVIGATION
               ====================================================== */
        function navigate(page) {
            state.page = page;
            state.verifyStep = 0;
            closeChat();
            // close any listeners that aren't needed
            if (state.marketUnsub && page !== 'marketplace') { state.marketUnsub();
                state.marketUnsub = null; }
            if (state.invUnsub && page !== 'inventory') { state.invUnsub();
                state.invUnsub = null; }
            if (state.tradesUnsub && page !== 'trades') { state.tradesUnsub();
                state.tradesUnsub = null; }
            if (state.wdUnsub && page !== 'wallet') { state.wdUnsub();
                state.wdUnsub = null; }
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /* ======================================================
               MAIN RENDER
               ====================================================== */
        async function render() {
            const main = document.getElementById('main-content');

            // If admin route, render admin panel
            if (state.page === 'admin') {
                main.innerHTML = await renderAdmin();
                renderNav();
                return;
            }

            // If transactions route
            if (state.page === 'transactions') {
                main.innerHTML = await renderTransactions();
                renderNav();
                return;
            }

            // ── AUTH GUARD ──
            const protectedPages = ['dashboard', 'inventory', 'mylistings', 'wallet', 'trades', 'profile'];
            if (protectedPages.includes(state.page) && !state.user) {
                state.page = 'login';
            }

            // ── RENDER PAGE ──
            switch (state.page) {
                case 'home':
                    main.innerHTML = renderHome();
                    // load stats
                    db.collection('listings').get().then(snap => {
                        const el = document.querySelector('#home-stats .stat-card:first-child .text-2xl');
                        if (el) el.textContent = snap.size;
                    });
                    db.collection('users').get().then(snap => {
                        const el = document.querySelector('#home-stats .stat-card:nth-child(2) .text-2xl');
                        if (el) el.textContent = snap.size;
                    });
                    db.collection('trades').where('status', '==', 'completed').get().then(snap => {
                        const el = document.querySelector('#home-stats .stat-card:nth-child(3) .text-2xl');
                        if (el) el.textContent = snap.size;
                    });
                    break;

                case 'login':
                case 'register':
                    main.innerHTML = renderAuth(state.page);
                    break;

                case 'dashboard':
                    main.innerHTML = renderDashboard();
                    // load recent trades
                    if (state.user) {
                        const tradesSnap = await db.collection('trades')
                            .where('buyerId', '==', state.user.id)
                            .orderBy('createdAt', 'desc')
                            .limit(5)
                            .get();
                        const tradesSnap2 = await db.collection('trades')
                            .where('sellerId', '==', state.user.id)
                            .orderBy('createdAt', 'desc')
                            .limit(5)
                            .get();
                        const allTrades = [];
                        tradesSnap.forEach(d => allTrades.push({ id: d.id, ...d.data() }));
                        tradesSnap2.forEach(d => allTrades.push({ id: d.id, ...d.data() }));
                        allTrades.sort((a, b) => b.createdAt - a.createdAt);
                        const unique = [];
                        const seen = new Set();
                        for (const t of allTrades) {
                            if (!seen.has(t.id)) { seen.add(t.id);
                                unique.push(t); }
                        }
                        const container = document.getElementById('recent-trades-container');
                        if (unique.length) {
                            let html =
                                '<h2 class="text-lg font-bold mb-4">Recent Trades</h2><div class="space-y-3">';
                            for (const t of unique.slice(0, 5)) {
                                const info = LIMITEDS_DB[t.assetId] || { name: 'Item' };
                                const isBuyer = t.buyerId === state.user.id;
                                const otherId = isBuyer ? t.sellerId : t.buyerId;
                                let otherName = 'User';
                                try {
                                    const oSnap = await db.collection('users').doc(otherId).get();
                                    if (oSnap.exists) otherName = oSnap.data().username || 'User';
                                } catch (e) {}
                                html += `<div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-4 flex items-center gap-4">
                                    <img src="${getItemImage(t.assetId)}" class="w-12 h-12 rounded-lg object-cover" onerror="this.src='${PLACEHOLDER_IMG}'">
                                    <div class="flex-1 min-w-0"><div class="font-semibold text-sm truncate">${info.name} #${t.serial}</div>
                                    <div class="text-xs text-[var(--muted)]">${isBuyer?'Bought from':'Sold to'} ${otherName} &middot; ${timeAgo(t.createdAt)}</div></div>
                                    <div class="text-right"><div class="font-bold text-sm" style="color:var(--accent)">${formatCoins(t.price)}</div>
                                    <span class="badge ${t.status==='chatting'?'badge-chatting':'badge-completed'}">${t.status==='chatting'?'In Progress':'Completed'}</span></div>
                                    ${t.status==='chatting'?`<button onclick="openChat('${t.id}')" class="btn-outline px-3 py-2 text-xs"><i class="fas fa-comment"></i></button>`:''}
                                </div>`;
                            }
                            html += '</div>';
                            container.innerHTML = html;
                        } else {
                            container.innerHTML =
                                '<p class="text-sm text-[var(--muted)]">No trades yet. Browse the marketplace to get started.</p>';
                        }
                    }
                    break;

                case 'marketplace':
                    main.innerHTML = renderMarketplace();
                    // listen to marketplace
                    listenMarketplace((listings) => {
                        lastMarketData = listings;
                        const grid = document.getElementById('market-grid');
                        const count = document.getElementById('market-count');
                        if (count) count.textContent = listings.length + ' items available';
                        if (grid) {
                            const search = document.getElementById('market-search');
                            const q = search ? search.value.toLowerCase().trim() : '';
                            const filtered = q ? listings.filter(l => l.name.toLowerCase().includes(q)) : listings;
                            grid.innerHTML = filtered.length ? filtered.map(l => itemCard(l, { showBuy: true,
                                    showSeller: true })).join('') :
                                `<div class="col-span-full text-center py-20 text-[var(--muted)]"><p>${q?'No items found matching "'+q+'"':'No items listed yet'}</p></div>`;
                        }
                    });
                    break;

                case 'inventory':
                    main.innerHTML = renderInventory();
                    // listen to inventory
                    if (state.user) {
                        if (state.invUnsub) { state.invUnsub();
                            state.invUnsub = null; }
                        state.invUnsub = db.collection('inventory')
                            .where('userId', '==', state.user.id)
                            .where('listed', '==', false)
                            .onSnapshot((snap) => {
                                const items = [];
                                snap.forEach(d => items.push({ id: d.id, ...d.data() }));
                                const grid = document.getElementById('inv-grid');
                                const count = document.getElementById('inv-count');
                                if (count) count.textContent = items.length + ' unlisted items';
                                if (grid) {
                                    grid.innerHTML = items.length ? items.map(i => itemCard(i, { showList: true }))
                                        .join('') :
                                        `<div class="col-span-full text-center py-20 text-[var(--muted)]"><i class="fas fa-box-open text-4xl mb-4 block opacity-30"></i><p>No unlisted items in your inventory</p></div>`;
                                }
                            }, (err) => {
                                console.error('Inventory listener error:', err);
                            });
                    }
                    break;

                case 'mylistings':
                    main.innerHTML = renderMyListings();
                    if (state.user) {
                        db.collection('listings')
                            .where('sellerId', '==', state.user.id)
                            .onSnapshot((snap) => {
                                const listings = [];
                                snap.forEach(d => listings.push({ id: d.id, ...d.data() }));
                                const grid = document.getElementById('mylist-grid');
                                const count = document.getElementById('mylist-count');
                                if (count) count.textContent = listings.length + ' active listings';
                                if (grid) {
                                    grid.innerHTML = listings.length ? listings.map(l => {
                                        const info = LIMITEDS_DB[l.assetId] || { name: 'Item', rap: 0 };
                                        return itemCard({ assetId: l.assetId, serial: l.serial,
                                            price: l.price, id: l.id }, { showDelist: true });
                                    }).join('') :
                                        `<div class="col-span-full text-center py-20 text-[var(--muted)]"><i class="fas fa-tag text-4xl mb-4 block opacity-30"></i><p>No active listings. Go to Inventory to list items.</p></div>`;
                                }
                            }, (err) => {
                                console.error('My listings listener error:', err);
                            });
                    }
                    break;

                case 'wallet':
                    main.innerHTML = renderWallet();
                    // withdrawal history
                    if (state.user) {
                        if (state.wdUnsub) { state.wdUnsub();
                            state.wdUnsub = null; }
                        state.wdUnsub = db.collection('withdrawals')
                            .where('userId', '==', state.user.id)
                            .orderBy('createdAt', 'desc')
                            .onSnapshot((snap) => {
                                const wds = [];
                                snap.forEach(d => wds.push({ id: d.id, ...d.data() }));
                                const container = document.getElementById('wd-history');
                                if (container) {
                                    if (wds.length) {
                                        let html = '<h2 class="text-lg font-bold mb-4">Withdrawal History</h2><div class="space-y-3">';
                                        for (const w of wds) {
                                            html += `<div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-4 flex items-center justify-between">
                                                <div><div class="font-semibold text-sm">${formatCoins(w.amount)}</div>
                                                <div class="text-xs text-[var(--muted)] font-mono mt-0.5">${w.address.slice(0,16)}...${w.address.slice(-8)}</div>
                                                <div class="text-xs text-[var(--muted)] mt-0.5">${timeAgo(w.createdAt)}</div></div>
                                                <span class="badge ${w.status==='pending'?'badge-pending':'badge-completed'}">${w.status}</span>
                                            </div>`;
                                        }
                                        html += '</div>';
                                        container.innerHTML = html;
                                    } else {
                                        container.innerHTML =
                                            '<p class="text-sm text-[var(--muted)]">No withdrawal history.</p>';
                                    }
                                }
                            }, (err) => {
                                console.error('Withdrawal listener error:', err);
                            });
                    }
                    break;

                case 'trades':
                    main.innerHTML = renderTrades();
                    if (state.user) {
                        if (state.tradesUnsub) { state.tradesUnsub();
                            state.tradesUnsub = null; }
                        // We need to listen to both buyer and seller trades
                        // Firestore doesn't support OR queries, so we listen to both and merge
                        const buyerUnsub = db.collection('trades')
                            .where('buyerId', '==', state.user.id)
                            .orderBy('createdAt', 'desc')
                            .onSnapshot(() => mergeTrades(), (err) => console.error('Buyer trades error:', err));
                        const sellerUnsub = db.collection('trades')
                            .where('sellerId', '==', state.user.id)
                            .orderBy('createdAt', 'desc')
                            .onSnapshot(() => mergeTrades(), (err) => console.error('Seller trades error:', err));
                        state.tradesUnsub = () => { buyerUnsub();
                            sellerUnsub(); };

                        async function mergeTrades() {
                            const container = document.getElementById('trades-list');
                            if (!container) return;
                            const [buyerSnap, sellerSnap] = await Promise.all([
                                db.collection('trades').where('buyerId', '==', state.user.id).orderBy('createdAt',
                                    'desc').get(),
                                db.collection('trades').where('sellerId', '==', state.user.id).orderBy('createdAt',
                                    'desc').get()
                            ]);
                            const all = [];
                            buyerSnap.forEach(d => all.push({ id: d.id, ...d.data() }));
                            sellerSnap.forEach(d => all.push({ id: d.id, ...d.data() }));
                            all.sort((a, b) => b.createdAt - a.createdAt);
                            const seen = new Set();
                            const unique = [];
                            for (const t of all) {
                                if (!seen.has(t.id)) { seen.add(t.id);
                                    unique.push(t); }
                            }
                            if (unique.length) {
                                let html = '<div class="space-y-3">';
                                for (const t of unique) {
                                    const info = LIMITEDS_DB[t.assetId] || { name: 'Item' };
                                    const isBuyer = t.buyerId === state.user.id;
                                    const otherId = isBuyer ? t.sellerId : t.buyerId;
                                    let otherName = 'User';
                                    try {
                                        const oSnap = await db.collection('users').doc(otherId).get();
                                        if (oSnap.exists) otherName = oSnap.data().username || 'User';
                                    } catch (e) {}
                                    html += `<div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-4 flex items-center gap-4">
                                        <img src="${getItemImage(t.assetId)}" class="w-14 h-14 rounded-lg object-cover" onerror="this.src='${PLACEHOLDER_IMG}'">
                                        <div class="flex-1 min-w-0"><div class="font-semibold text-sm truncate">${info.name} <span class="text-[var(--muted)]">#${t.serial}</span></div>
                                        <div class="text-xs text-[var(--muted)]">${isBuyer?'Purchased from':'Sold to'} ${otherName}</div>
                                        <div class="text-xs text-[var(--muted)]">${timeAgo(t.createdAt)}</div></div>
                                        <div class="text-right"><div class="font-bold text-sm" style="color:var(--accent)">${formatCoins(t.price)}</div>
                                        <span class="badge ${t.status==='chatting'?'badge-chatting':'badge-completed'}">${t.status==='chatting'?'In Progress':'Completed'}</span></div>
                                        ${t.status==='chatting'?`<button onclick="openChat('${t.id}')" class="btn-primary px-4 py-2 text-xs"><i class="fas fa-comment mr-1"></i>Chat</button>`:''}
                                    </div>`;
                                }
                                html += '</div>';
                                container.innerHTML = html;
                            } else {
                                container.innerHTML =
                                    '<div class="text-center py-20 text-[var(--muted)]"><i class="fas fa-handshake text-4xl mb-4 block opacity-30"></i><p>No trades yet. Browse the marketplace to get started.</p></div>';
                            }
                        }
                        mergeTrades();
                    }
                    break;

                case 'profile':
                    main.innerHTML = renderProfile();
                    break;

                default:
                    main.innerHTML = renderHome();
            }

            renderNav();
        }

        /* ======================================================
               NAVBAR
               ====================================================== */
        function renderNav() {
            const links = document.getElementById('nav-links');
            const right = document.getElementById('nav-right');

            // Admin link - show always (if not admin, triggers login; if admin, goes to admin panel)
            const adminLink = `<span class="nav-link ${state.page==='admin'?'active':''}" onclick="navigate('admin')">${state.admin ? '👑 Admin' : 'Admin'}</span>`;

            if (state.user) {
                links.innerHTML = `
                    <span class="nav-link ${state.page==='marketplace'?'active':''}" onclick="navigate('marketplace')">Marketplace</span>
                    <span class="nav-link ${state.page==='trades'?'active':''}" onclick="navigate('trades')">Trades</span>
                    <span class="nav-link ${state.page==='wallet'?'active':''}" onclick="navigate('wallet')">Wallet</span>
                    <span class="nav-link ${state.page==='inventory'?'active':''}" onclick="navigate('inventory')">Inventory</span>
                    <span class="nav-link ${state.page==='mylistings'?'active':''}" onclick="navigate('mylistings')">My Listings</span>
                    <span class="nav-link ${state.page==='transactions'?'active':''}" onclick="navigate('transactions')">Transactions</span>
                    ${adminLink}
                `;
                right.innerHTML = `
                    <div class="flex items-center gap-2 bg-[var(--card)] border border-[var(--border)] rounded-lg px-3 py-1.5 cursor-pointer" onclick="navigate('wallet')">
                        <i class="fas fa-coins text-xs" style="color:var(--accent)"></i>
                        <span class="text-sm font-semibold">${formatCoins(state.user.balance)}</span>
                    </div>
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold cursor-pointer" style="background:var(--accent-dim);color:var(--accent)" onclick="navigate('profile')">${state.user.username.charAt(0).toUpperCase()}</div>`;
            } else {
                links.innerHTML = `
                    <span class="nav-link ${state.page==='marketplace'?'active':''}" onclick="navigate('marketplace')">Marketplace</span>
                    ${adminLink}
                `;
                right.innerHTML = `
                    <button onclick="navigate('login')" class="btn-outline px-4 py-2 text-sm">Sign In</button>
                    <button onclick="navigate('register')" class="btn-primary px-4 py-2 text-sm">Sign Up</button>`;
            }
        }

        /* ======================================================
               INIT
               ====================================================== */
        // Start the app — auth state listener already handles rendering
        render();
    </script>
</body>
</html>
