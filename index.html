<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LimitedVault — Roblox Limiteds Marketplace</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
tailwind.config={theme:{extend:{fontFamily:{display:['Space Grotesk','sans-serif'],mono:['JetBrains Mono','monospace']}}}}
</script>
<style>
:root{--bg:#08080a;--bg2:#111114;--card:#16161a;--card-h:#1e1e24;--border:#25252d;--text:#ececf0;--muted:#8b8b9e;--accent:#e8a820;--accent-h:#f0be3c;--accent-dim:rgba(232,168,32,.1);--success:#22c55e;--danger:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--muted)}
.page-enter{animation:pageIn .35s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes float1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,-40px) scale(1.1)}}
@keyframes float2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,30px) scale(.9)}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(232,168,32,.1)}50%{box-shadow:0 0 40px rgba(232,168,32,.2)}}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes slideOutRight{from{transform:translateX(0)}to{transform:translateX(100%)}}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
.blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:.35;pointer-events:none}
.blob-1{width:400px;height:400px;background:var(--accent);top:-100px;left:-100px;animation:float1 12s ease-in-out infinite}
.blob-2{width:350px;height:350px;background:#b45309;bottom:-80px;right:-80px;animation:float2 15s ease-in-out infinite}
.btn-primary{background:var(--accent);color:#000;font-weight:600;border:none;border-radius:.5rem;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-primary:active{transform:scale(.97)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:.5rem;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:var(--danger);color:#fff;font-weight:600;border:none;border-radius:.5rem;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-danger:hover{background:#dc2626}
.input-field{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:.5rem;padding:.65rem .85rem;font-family:inherit;font-size:.875rem;width:100%;transition:border-color .2s;outline:none}
.input-field:focus{border-color:var(--accent)}
.input-field::placeholder{color:var(--muted)}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:.75rem;overflow:hidden;transition:all .3s}
.item-card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 30px rgba(232,168,32,.08)}
.nav-link{color:var(--muted);font-size:.875rem;font-weight:500;cursor:pointer;transition:color .2s;padding:.25rem 0;position:relative}
.nav-link:hover,.nav-link.active{color:var(--accent)}
.nav-link.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--accent);border-radius:1px}
#chat-panel{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100vw;background:var(--bg2);border-left:1px solid var(--border);z-index:60;transform:translateX(100%);transition:transform .3s ease}
#chat-panel.open{transform:translateX(0)}
#chat-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55;display:none}
#chat-overlay.open{display:block}
.toast{animation:toastIn .3s ease forwards;padding:.75rem 1rem;border-radius:.5rem;font-size:.85rem;font-weight:500;display:flex;align-items:center;gap:.5rem;max-width:360px;backdrop-filter:blur(12px)}
.toast.removing{animation:toastOut .3s ease forwards}
.toast-success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--success)}
.toast-error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--danger)}
.toast-info{background:rgba(232,168,32,.15);border:1px solid rgba(232,168,32,.3);color:var(--accent)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:70;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:1rem;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;animation:pageIn .25s ease}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:.75rem;padding:1.25rem;text-align:center}
.step-num{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#000;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}
.badge{display:inline-flex;align-items:center;padding:.15rem .5rem;border-radius:9999px;font-size:.7rem;font-weight:600}
.badge-pending{background:rgba(232,168,32,.15);color:var(--accent)}
.badge-completed{background:rgba(34,197,94,.15);color:var(--success)}
.badge-chatting{background:rgba(56,189,248,.15);color:#38bdf8}
@media(max-width:640px){#chat-panel{width:100%}.hero-title{font-size:2rem!important}}
</style>
</head>
<body>

<!-- Navbar -->
<nav id="navbar" class="fixed top-0 left-0 right-0 z-50 border-b border-[var(--border)]" style="background:rgba(8,8,10,.85);backdrop-filter:blur(16px)">
<div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
<a onclick="navigate('home')" class="flex items-center gap-2.5 cursor-pointer select-none">
<div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:var(--accent)"><i class="fas fa-vault text-black text-sm"></i></div>
<span class="font-bold text-lg tracking-tight">LimitedVault</span>
</a>
<div id="nav-links" class="hidden md:flex items-center gap-6"></div>
<div id="nav-right" class="flex items-center gap-3"></div>
</div>
</nav>

<!-- Main Content -->
<main id="main-content" class="pt-16 min-h-screen"></main>

<!-- Chat Panel -->
<div id="chat-overlay" onclick="closeChat()"></div>
<div id="chat-panel">
<div id="chat-header" class="h-16 border-b border-[var(--border)] flex items-center px-4 gap-3"></div>
<div id="chat-messages" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3" style="height:calc(100vh - 64px - 72px)"></div>
<div id="chat-input-area" class="border-t border-[var(--border)] p-3 flex gap-2" style="height:72px"></div>
</div>

<!-- Toasts -->
<div id="toast-container" class="fixed top-20 right-4 z-[80] flex flex-col gap-2"></div>

<!-- Modal -->
<div id="modal-root"></div>

<script>
/* ===== CONFIG ===== */
const DISCORD_WEBHOOK_URL = 'YOUR_DISCORD_WEBHOOK_URL_HERE';
const CRYPTO_ADDRESSES = {
    BTC: 'bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh',
    ETH: '0x71C7656EC7ab88b098defB751B7401B5f6d8976F',
    LTC: 'ltc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh'
};

/* ===== LIMITEDS DATABASE ===== */
const LIMITEDS_DB = {
    95889909:{name:'Dominus Empyreus',rap:45000000},
    95138254:{name:'Dominus Infernus',rap:32000000},
    134082573:{name:'Headless Head',rap:3200000},
    169631788:{name:'Korblox Deathspeaker',rap:4500000},
    136576247:{name:'Dominus Frigidus',rap:25000000},
    100623548:{name:'Dominus Rex',rap:12000000},
    194287532:{name:'Dominus Messor',rap:8000000},
    209808838:{name:'Dominus Hyacinthus',rap:6000000},
    183514764:{name:'Dominus Phoenicis',rap:4000000},
    416258319:{name:'Dominus Vespertilio',rap:3500000},
    150434017:{name:'Red Bandana',rap:1500000},
    80651994:{name:'Clockwork Shades',rap:800000},
    106219663:{name:'Bear Face Mask',rap:400000},
    202465666:{name:'Midnight Shades',rap:300000},
    698491419:{name:'Violet Valkyrie',rap:2800000},
    627247525:{name:'Teal Valkyrie',rap:2200000},
    613655044:{name:'Green Banded Top Hat',rap:1800000},
    607708757:{name:'Lord Domitus',rap:9500000}
};
const LIMITED_IDS = Object.keys(LIMITEDS_DB).map(Number);
const PLACEHOLDER_IMG = "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200"><rect fill="#16161a" width="200" height="200"/><text fill="#8b8b9e" font-family="sans-serif" font-size="13" x="100" y="105" text-anchor="middle">No Image</text></svg>');

/* ===== STATE ===== */
const state = {
    page: 'home',
    user: null,
    verifyStep: 0,
    verifyPhrase: '',
    verifyUsername: '',
    chatTradeId: null,
    mobileMenu: false
};

/* ===== STORAGE HELPERS ===== */
function getStore(key, def=[]) { try { return JSON.parse(localStorage.getItem('lv_'+key)) || def } catch { return def } }
function setStore(key, val) { localStorage.setItem('lv_'+key, JSON.stringify(val)) }
function genId() { return 'id_' + Math.random().toString(36).substr(2,9) + Date.now().toString(36) }
function getItemImage(id) { return `https://roblox.com/asset-thumbnail/image?assetId=${id}&width=420&height=420&format=png` }
function formatRap(r) { return 'R$ ' + Number(r).toLocaleString() }
function formatCoins(c) { return '$' + Number(c).toLocaleString() }
function timeAgo(ts) {
    const s = Math.floor((Date.now()-ts)/1000);
    if(s<60) return 'just now'; if(s<3600) return Math.floor(s/60)+'m ago';
    if(s<86400) return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago';
}
function generatePhrase() { const w=['Alpha','Bravo','Vault','Verify','Gold','Prime','Nova','Flux','Pixel','Crest']; return w[Math.floor(Math.random()*w.length)]+'-'+Math.floor(1000+Math.random()*9000) }

/* ===== SEED DATA ===== */
function seedData() {
    if(localStorage.getItem('lv_seeded')) return;
    const u1={id:'seed_1',username:'xLimitedKing',email:'king@seed.com',password:'demo123',robloxUsername:'xLimitedKing',robloxUserId:12345678,verified:true,balance:15000,createdAt:Date.now()-864e5*30};
    const u2={id:'seed_2',username:'TradeMaster',email:'tm@seed.com',password:'demo123',robloxUsername:'TradeMaster99',robloxUserId:87654321,verified:true,balance:8200,createdAt:Date.now()-864e5*15};
    setStore('users',[u1,u2]);
    const inv1=[
        {userId:'seed_1',assetId:95889909,serial:1042,listed:false},
        {userId:'seed_1',assetId:169631788,serial:5891,listed:false},
        {userId:'seed_1',assetId:150434017,serial:12043,listed:false}
    ];
    const inv2=[
        {userId:'seed_2',assetId:134082573,serial:8834,listed:false},
        {userId:'seed_2',assetId:80651994,serial:4521,listed:false},
        {userId:'seed_2',assetId:202465666,serial:22190,listed:false},
        {userId:'seed_2',assetId:106219663,serial:18432,listed:false}
    ];
    setStore('inventory',[...inv1,...inv2]);
    const listings=[
        {id:'list_s1',sellerId:'seed_1',assetId:95889909,price:5500,serial:1042,createdAt:Date.now()-864e5*2},
        {id:'list_s2',sellerId:'seed_1',assetId:150434017,price:165,serial:12043,createdAt:Date.now()-864e5*1},
        {id:'list_s3',sellerId:'seed_2',assetId:134082573,price:385,serial:8834,createdAt:Date.now()-864e5*3},
        {id:'list_s4',sellerId:'seed_2',assetId:80651994,price:92,serial:4521,createdAt:Date.now()-864e5*1},
        {id:'list_s5',sellerId:'seed_2',assetId:202465666,price:35,serial:22190,createdAt:Date.now()-36e5*8},
        {id:'list_s6',sellerId:'seed_2',assetId:106219663,price:48,serial:18432,createdAt:Date.now()-36e5*5}
    ];
    listings.forEach(l=>{ inv1.concat(inv2).find(i=>i.assetId===l.assetId&&i.userId===l.sellerId&&(i.listed=true,i.listingId=l.id)) });
    setStore('inventory',[...inv1,...inv2]);
    setStore('listings',listings);
    setStore('trades',[]);
    setStore('messages',[]);
    setStore('withdrawals',[]);
    localStorage.setItem('lv_seeded','1');
}

/* ===== AUTH ===== */
async function register(uname, email, pw) {
    if (pw.length < 6)
        return toast('Password must be at least 6 characters', 'error');

    try {
        const credential = await window.createUserWithEmailAndPassword(
            window.auth,
            email,
            pw
        );

        const user = {
            id: credential.user.uid,
            username: uname,
            email: email,
            robloxUsername: '',
            robloxUserId: 0,
            verified: false,
            balance: 0,
            createdAt: Date.now()
        };

        const users = getStore('users');
        users.push(user);
        setStore('users', users);

        state.user = user;

        toast('Account created successfully!', 'success');
        navigate('dashboard');

    } catch (error) {

        if (error.code === "auth/email-already-in-use")
            return toast("Email already registered", "error");

        if (error.code === "auth/invalid-email")
            return toast("Invalid email address", "error");

        if (error.code === "auth/weak-password")
            return toast("Password is too weak", "error");

        toast(error.message, "error");
    }
}

function login(email,pw) {
    const users=getStore('users');
    const user=users.find(u=>u.email===email&&u.password===pw);
    if(!user) return toast('Invalid email or password','error');
    state.user=user; toast('Welcome back, '+user.username,'success'); navigate('dashboard');
}

function logout() {
    state.user=null;
    state.chatTradeId=null;
    closeChat();
    toast('Logged out','info');
    navigate('home');
}

function refreshUser() {
    if(!state.user) return;
    const users=getStore('users');
    const u=users.find(x=>x.id===state.user.id);
    if(u) state.user=u;
}

function updateUser(updates) {
    const users=getStore('users');
    const i=users.findIndex(u=>u.id===state.user.id);
    if(i<0) return;
    Object.assign(users[i],updates);
    setStore('users',users);
    state.user=users[i];
}

/* ===== ROBLOX VERIFICATION ===== */
function startVerify(rbxF) {
    if(!rbxF.trim()) return toast('Enter your Roblox username','error');
    state.verifyUsername=rbxF.trim();
    state.verifyPhrase=generatePhrase();
    state.verifyStep=1;
    render();
}

function completeVerify() {
    const ruid=Math.floor(10000000+Math.random()*90000000);
    updateUser({
        robloxUsername:state.verifyUsername,
        robloxUserId:ruid,
        verified:true
    });

    const inv=getStore('inventory');
    const count=3+Math.floor(Math.random()*3);
    const shuffled=[...LIMITED_IDS].sort(()=>Math.random()-.5).slice(0,count);

    shuffled.forEach(aid=>{
        inv.push({
            userId:state.user.id,
            assetId:aid,
            serial:Math.floor(1000+Math.random()*30000),
            listed:false
        });
    });

    setStore('inventory',inv);
    state.verifyStep=0;
    toast('Roblox account verified!','success');
    navigate('inventory');
}

/* ===== INVENTORY ===== */
function getUserInventory() {
    return getStore('inventory').filter(i=>i.userId===state.user.id&&!i.listed);
}

function getUserListedInventory() {
    return getStore('inventory').filter(i=>i.userId===state.user.id&&i.listed);
}

/* ===== LISTINGS ===== */
function createListing(assetId,price) {
    price=parseFloat(price);
    if(!price||price<1) return toast('Price must be at least 1 coin','error');
    const inv=getStore('inventory');
    const item=inv.find(i=>i.userId===state.user.id&&i.assetId===assetId&&!i.listed);
    if(!item) return toast('Item not found in your inventory','error');
    const listing={id:genId(),sellerId:state.user.id,assetId,price,serial:item.serial,createdAt:Date.now()};
    const listings=getStore('listings'); listings.push(listing); setStore('listings',listings);
    item.listed=true; item.listingId=listing.id; setStore('inventory',inv);
    toast('Item listed for '+formatCoins(price),'success'); closeModal(); render();
}
function cancelListing(listingId) {
    const listings=getStore('listings');
    const li=listings.find(l=>l.id===listingId);
    if(!li||li.sellerId!==state.user.id) return;
    const inv=getStore('inventory');
    const item=inv.find(i=>i.listingId===listingId);
    if(item){item.listed=false;delete item.listingId}
    setStore('inventory',inv);
    setStore('listings',listings.filter(l=>l.id!==listingId));
    toast('Listing cancelled','info'); render();
}
function getMarketplaceListings() {
    const listings=getStore('listings');
    const users=getStore('users');
    return listings.map(l=>{
        const seller=users.find(u=>u.id===l.sellerId);
        const info=LIMITEDS_DB[l.assetId]||{name:'Unknown Item',rap:0};
        return {...l,sellerName:seller?seller.username:'Unknown',name:info.name,rap:info.rap};
    });
}

/* ===== TRADES ===== */
function buyItem(listingId) {
    refreshUser();
    const listings=getStore('listings'); const li=listings.find(l=>l.id===listingId);
    if(!li) return toast('Listing not found','error');
    if(li.sellerId===state.user.id) return toast("You can't buy your own item",'error');
    if(state.user.balance<li.price) return toast('Insufficient balance. Please deposit coins.','error');
    /* Deduct balance */
    const users=getStore('users'); const buyer=users.find(u=>u.id===state.user.id);
    buyer.balance-=li.price; setStore('users',users); state.user=buyer;
    /* Remove listing */
    setStore('listings',listings.filter(l=>l.id!==listingId));
    const inv=getStore('inventory');
    const item=inv.find(i=>i.listingId===listingId);
    if(item){item.listed=false;delete item.listingId}
    setStore('inventory',inv);
    /* Create trade */
    const trade={id:genId(),listingId,assetId:li.assetId,name:LIMITEDS_DB[li.assetId]?.name||'Item',serial:li.serial,price:li.price,buyerId:state.user.id,sellerId:li.sellerId,status:'chatting',buyerRoblox:'',createdAt:Date.now()};
    const trades=getStore('trades'); trades.push(trade); setStore('trades',trades);
    /* System message */
    const msgs=getStore('messages');
    msgs.push({id:genId(),tradeId:trade.id,from:'system',text:'Trade started! Buyer, please send your Roblox username to the seller.',ts:Date.now()});
    setStore('messages',msgs);
    toast('Purchase successful! Chat opened.','success');
    openChat(trade.id);
}
function releaseTrade(tradeId) {
    const trades=getStore('trades'); const t=trades.find(x=>x.id===tradeId);
    if(!t||t.buyerId!==state.user.id) return toast('Unauthorized','error');
    if(t.status!=='chatting') return toast('Trade already completed','error');
    t.status='completed'; setStore('trades',trades);
    /* Credit seller */
    const users=getStore('users'); const seller=users.find(u=>u.id===t.sellerId);
    if(seller){seller.balance+=t.price; setStore('users',users)}
    const msgs=getStore('messages');
    msgs.push({id:genId(),tradeId:t.id,from:'system',text:'Payment released! '+formatCoins(t.price)+' has been added to the seller\'s balance.',ts:Date.now()});
    setStore('messages',msgs);
    toast('Payment released to seller','success'); renderChat();
}

/* ===== CHAT ===== */
function openChat(tradeId) {
    state.chatTradeId=tradeId;
    document.getElementById('chat-panel').classList.add('open');
    document.getElementById('chat-overlay').classList.add('open');
    renderChat();
}
function closeChat() {
    state.chatTradeId=null;
    document.getElementById('chat-panel').classList.remove('open');
    document.getElementById('chat-overlay').classList.remove('open');
}
function sendChatMsg(text) {
    if(!text.trim()||!state.chatTradeId) return;
    const msgs=getStore('messages');
    msgs.push({id:genId(),tradeId:state.chatTradeId,from:state.user.id,text:text.trim(),ts:Date.now()});
    setStore('messages',msgs); renderChat();
}
function renderChat() {
    if(!state.chatTradeId) return;
    const trades=getStore('trades'); const t=trades.find(x=>x.id===state.chatTradeId);
    if(!t) return;
    const users=getStore('users');
    const otherUser=users.find(u=>u.id===(t.buyerId===state.user.id?t.sellerId:t.buyerId));
    const info=LIMITEDS_DB[t.assetId]||{name:'Item'};
    /* Header */
    document.getElementById('chat-header').innerHTML=`
        <button onclick="closeChat()" class="text-[var(--muted)] hover:text-[var(--text)] transition-colors"><i class="fas fa-arrow-left"></i></button>
        <img src="${getItemImage(t.assetId)}" class="w-9 h-9 rounded-lg object-cover" onerror="this.src='${PLACEHOLDER_IMG}'">
        <div class="flex-1 min-w-0">
            <div class="font-semibold text-sm truncate">${info.name} <span class="text-[var(--muted)]">#${t.serial}</span></div>
            <div class="text-xs text-[var(--muted)]">Chat with ${otherUser?otherUser.username:'User'}</div>
        </div>
        <span class="badge ${t.status==='chatting'?'badge-chatting':'badge-completed'}">${t.status==='chatting'?'In Trade':'Completed'}</span>`;
    /* Messages */
    const msgs=getStore('messages').filter(m=>m.tradeId===state.chatTradeId).sort((a,b)=>a.ts-b.ts);
    const msgHtml=msgs.map(m=>{
        if(m.from==='system') return `<div class="text-center text-xs text-[var(--muted)] bg-[var(--accent-dim)] rounded-lg py-2 px-3">${m.text}</div>`;
        const isMe=m.from===state.user.id;
        return `<div class="flex ${isMe?'justify-end':'justify-start'}"><div class="max-w-[75%] ${isMe?'bg-[var(--accent)] text-black':'bg-[var(--card)] border border-[var(--border)]'} rounded-xl px-3.5 py-2.5 text-sm"><div>${escHtml(m.text)}</div><div class="text-[10px] ${isMe?'text-black/50':'text-[var(--muted)]'} mt-1">${timeAgo(m.ts)}</div></div></div>`;
    }).join('');
    document.getElementById('chat-messages').innerHTML=msgHtml||'<div class="flex-1 flex items-center justify-center text-[var(--muted)] text-sm">No messages yet</div>';
    const mc=document.getElementById('chat-messages'); mc.scrollTop=mc.scrollHeight;
    /* Input */
    const isBuyer=t.buyerId===state.user.id;
    const showRelease=isBuyer&&t.status==='chatting';
    document.getElementById('chat-input-area').innerHTML=`
        ${showRelease?`<button onclick="releaseTrade('${t.id}')" class="btn-primary text-xs px-3 py-2 whitespace-nowrap" style="background:var(--success)"><i class="fas fa-check mr-1"></i>Release</button>`:''}
        <input type="text" id="chat-input" class="input-field flex-1" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChatMsg(this.value);if(event.key==='Enter')this.value=''">
        <button onclick="const i=document.getElementById('chat-input');sendChatMsg(i.value);i.value=''" class="btn-primary px-3 py-2"><i class="fas fa-paper-plane text-sm"></i></button>`;
}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* ===== WALLET ===== */
function simulateDeposit(amount) {
    amount=parseFloat(amount);
    if(!amount||amount<1) return toast('Minimum deposit is 1 coin','error');
    refreshUser(); updateUser({balance:state.user.balance+amount});
    toast(formatCoins(amount)+' deposited to your balance','success'); closeModal(); render();
}
function requestWithdraw(amount,address) {
    amount=parseFloat(amount); address=address.trim();
    if(!amount||amount<10) return toast('Minimum withdrawal is 10 coins','error');
    refreshUser();
    if(amount>state.user.balance) return toast('Insufficient balance','error');
    if(!address) return toast('Enter a crypto address','error');
    updateUser({balance:state.user.balance-amount});
    const w={id:genId(),userId:state.user.id,username:state.user.username,amount,address,status:'pending',createdAt:Date.now()};
    const withdrawals=getStore('withdrawals'); withdrawals.push(w); setStore('withdrawals',withdrawals);
    /* Discord webhook */
    sendDiscordWebhook(w);
    toast('Withdrawal request submitted','success'); closeModal(); render();
}
async function sendDiscordWebhook(w) {
    if(DISCORD_WEBHOOK_URL==='YOUR_DISCORD_WEBHOOK_URL_HERE') { console.log('Withdrawal request (no webhook configured):',w); return; }
    try {
        await fetch(DISCORD_WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
            embeds:[{title:'New Withdrawal Request',color:0xe8a820,fields:[
                {name:'User',value:w.username,inline:true},{name:'Amount',value:'$'+w.amount,inline:true},
                {name:'Address',value:'`'+w.address+'`',inline:false},{name:'Status',value:'Pending',inline:true},
                {name:'Date',value:new Date().toLocaleString(),inline:true}
            ],footer:{text:'LimitedVault'},timestamp:new Date().toISOString()}]
        })});
    } catch(e){console.error('Webhook error:',e)}
}

/* ===== TOAST ===== */
function toast(msg,type='info') {
    const c=document.getElementById('toast-container');
    const el=document.createElement('div');
    el.className=`toast toast-${type}`;
    const icons={success:'fa-check-circle',error:'fa-exclamation-circle',info:'fa-info-circle'};
    el.innerHTML=`<i class="fas ${icons[type]||icons.info}"></i><span>${msg}</span>`;
    c.appendChild(el);
    setTimeout(()=>{el.classList.add('removing');setTimeout(()=>el.remove(),300)},3500);
}

            <p class="text-xs text-[var(--muted)] mt-2">1 Coin = $1 USD</p>
        </div>
        <div class="grid md:grid-cols-2 gap-4 mb-8">
            <div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-5">
                <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fas fa-arrow-down" style="color:var(--success)"></i> Deposit Coins</h3>
                <p class="text-xs text-[var(--muted)] mb-4">Send crypto to the address below. Funds will be credited after confirmation.</p>
                <div class="space-y-3 mb-4">
                    ${Object.entries(CRYPTO_ADDRESSES).map(([k,v])=>`<div class="bg-[var(--bg2)] rounded-lg p-3">
                        <div class="flex items-center justify-between mb-1"><span class="text-xs font-semibold">${k}</span><button onclick="navigator.clipboard.writeText('${v}');toast('Address copied','success')" class="text-xs text-[var(--accent)] hover:underline"><i class="fas fa-copy mr-1"></i>Copy</button></div>
                        <code class="text-[10px] text-[var(--muted)] font-mono break-all">${v}</code>
                    </div>`).join('')}
                </div>
                <div class="bg-[var(--accent-dim)] border border-[rgba(232,168,32,.2)] rounded-lg p-3 mb-4">
                    <p class="text-xs text-[var(--accent)]"><i class="fas fa-info-circle mr-1"></i>Demo mode: Use the button below to simulate a deposit.</p>
                </div>
                <div class="flex gap-2">
                    <input type="number" id="deposit-amount" class="input-field flex-1" placeholder="Amount" min="1">
                    <button onclick="simulateDeposit(document.getElementById('deposit-amount').value)" class="btn-primary px-4 py-2 text-sm">Deposit</button>
                </div>
            </div>
            <div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-5">
                <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fas fa-arrow-up" style="color:var(--danger)"></i> Withdraw Coins</h3>
                <p class="text-xs text-[var(--muted)] mb-4">Minimum withdrawal: 10 coins. Requests are processed manually.</p>
                <div class="mb-3"><label class="text-xs text-[var(--muted)] block mb-1">Amount (Coins)</label>
                <input type="number" id="wd-amount" class="input-field" placeholder="e.g. 100" min="10" max="${state.user.balance}"></div>
                <div class="mb-4"><label class="text-xs text-[var(--muted)] block mb-1">Crypto Address</label>
                <input type="text" id="wd-addr" class="input-field" placeholder="Enter your crypto address"></div>
                <div class="mb-4"><label class="text-xs text-[var(--muted)] block mb-1">Network</label>
                <select id="wd-network" class="input-field"><option>BTC</option><option>ETH</option><option>LTC</option></select></div>
                <button onclick="requestWithdraw(document.getElementById('wd-amount').value,document.getElementById('wd-addr').value)" class="btn-danger w-full py-2.5 text-sm">Request Withdrawal</button>
            </div>
        </div>
        ${withdrawals.length?`<h2 class="text-lg font-bold mb-4">Withdrawal History</h2>
        <div class="space-y-3">${withdrawals.map(w=>`<div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-4 flex items-center justify-between">
            <div><div class="font-semibold text-sm">${formatCoins(w.amount)}</div>
            <div class="text-xs text-[var(--muted)] font-mono mt-0.5">${w.address.slice(0,16)}...${w.address.slice(-8)}</div>
            <div class="text-xs text-[var(--muted)] mt-0.5">${timeAgo(w.createdAt)}</div></div>
            <span class="badge ${w.status==='pending'?'badge-pending':'badge-completed'}">${w.status}</span>
        </div>`).join('')}</div>`:''}
    </div>`;
}

function renderTrades() {
    refreshUser();
    const trades=getStore('trades').filter(t=>t.buyerId===state.user.id||t.sellerId===state.user.id).sort((a,b)=>b.createdAt-a.createdAt);
    return `<div class="page-enter max-w-5xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-8">My Trades</h1>
        ${trades.length?`<div class="space-y-3">${trades.map(t=>{
            const info=LIMITEDS_DB[t.assetId]||{name:'Item'};
            const isBuyer=t.buyerId===state.user.id;
            const otherId=isBuyer?t.sellerId:t.buyerId;
            const other=getStore('users').find(u=>u.id===otherId);
            return `<div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-4 flex items-center gap-4">
                <img src="${getItemImage(t.assetId)}" class="w-14 h-14 rounded-lg object-cover" onerror="this.src='${PLACEHOLDER_IMG}'">
                <div class="flex-1 min-w-0"><div class="font-semibold text-sm truncate">${info.name} <span class="text-[var(--muted)]">#${t.serial}</span></div>
                <div class="text-xs text-[var(--muted)]">${isBuyer?'Purchased from':'Sold to'} ${other?other.username:'User'}</div>
                <div class="text-xs text-[var(--muted)]">${timeAgo(t.createdAt)}</div></div>
                <div class="text-right"><div class="font-bold text-sm" style="color:var(--accent)">${formatCoins(t.price)}</div>
                <span class="badge ${t.status==='chatting'?'badge-chatting':'badge-completed'}">${t.status==='chatting'?'In Progress':'Completed'}</span></div>
                ${t.status==='chatting'?`<button onclick="openChat('${t.id}')" class="btn-primary px-4 py-2 text-xs"><i class="fas fa-comment mr-1"></i>Chat</button>`:''}
            </div>`}).join('')}</div>`:`<div class="text-center py-20 text-[var(--muted)]"><i class="fas fa-handshake text-4xl mb-4 block opacity-30"></i><p>No trades yet. Browse the marketplace to get started.</p></div>`}
    </div>`;
}

function renderProfile() {
    if(!state.user) return renderAuth('login');
    return `<div class="page-enter max-w-2xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-8">Profile</h1>
        <div class="bg-[var(--card)] border border-[var(--border)] rounded-xl p-6 mb-6">
            <div class="flex items-center gap-4 mb-6">
                <div class="w-16 h-16 rounded-full flex items-center justify-center text-2xl font-bold" style="background:var(--accent-dim);color:var(--accent)">${state.user.username.charAt(0).toUpperCase()}</div>
                <div><h2 class="text-xl font-bold">${state.user.username}</h2>
                <p class="text-sm text-[var(--muted)]">${state.user.email}</p>
                ${state.user.verified?`<span class="badge badge-completed mt-1"><i class="fas fa-check mr-1"></i>Roblox Verified</span>`:`<span class="badge badge-pending mt-1">Not Verified</span>`}</div>
            </div>
            ${state.user.verified?`<div class="grid grid-cols-2 gap-4">
                <div class="bg-[var(--bg2)] rounded-lg p-3"><p class="text-xs text-[var(--muted)]">Roblox Username</p><p class="font-semibold text-sm mt-1">${state.user.robloxUsername}</p></div>
                <div class="bg-[var(--bg2)] rounded-lg p-3"><p class="text-xs text-[var(--muted)]">User ID</p><p class="font-semibold text-sm mt-1 font-mono">${state.user.robloxUserId}</p></div>
                <div class="bg-[var(--bg2)] rounded-lg p-3"><p class="text-xs text-[var(--muted)]">Balance</p><p class="font-semibold text-sm mt-1" style="color:var(--accent)">${formatCoins(state.user.balance)}</p></div>
                <div class="bg-[var(--bg2)] rounded-lg p-3"><p class="text-xs text-[var(--muted)]">Member Since</p><p class="font-semibold text-sm mt-1">${new Date(state.user.createdAt).toLocaleDateString()}</p></div>
            </div>
            <div class="mt-4 flex gap-3">
                <a href="https://www.roblox.com/users/${state.user.robloxUserId}/profile" target="_blank" class="btn-outline px-4 py-2 text-xs flex-1 text-center"><i class="fas fa-external-link-alt mr-1"></i>Roblox Profile</a>
                <a href="https://www.rolimons.com/player/${state.user.robloxUserId}" target="_blank" class="btn-outline px-4 py-2 text-xs flex-1 text-center"><i class="fas fa-external-link-alt mr-1"></i>Rolimons</a>
            </div>`:`<p class="text-sm text-[var(--muted)]">Verify your Roblox account to see your profile details.</p>`}
        </div>
        <button onclick="logout()" class="btn-danger w-full py-3 text-sm"><i class="fas fa-sign-out-alt mr-2"></i>Log Out</button>
    </div>`;
}

/* ===== MARKETPLACE SEARCH ===== */
function filterMarketplace(q) {
    q=q.toLowerCase().trim();
    const grid=document.getElementById('market-grid');
    if(!grid) return;
    const listings=getMarketplaceListings().sort((a,b)=>b.createdAt-a.createdAt);
    const filtered=q?listings.filter(l=>l.name.toLowerCase().includes(q)):listings;
    grid.innerHTML=filtered.length?filtered.map(l=>itemCard(l,{showBuy:true,showSeller:true})).join('')
        :`<div class="col-span-full text-center py-20 text-[var(--muted)]"><p>No items found matching "${q}"</p></div>`;
}

/* ===== NAVIGATION ===== */
function navigate(page) {
    state.page=page;
    state.verifyStep=0;
    closeChat();
    render();
    window.scrollTo({top:0,behavior:'smooth'});
}

/* ===== RENDER ===== */
function render() {
    const main=document.getElementById('main-content');
    switch(state.page) {
        case 'home': main.innerHTML=renderHome(); break;
        case 'login': main.innerHTML=renderAuth('login'); break;
        case 'register': main.innerHTML=renderAuth('register'); break;
        case 'dashboard': main.innerHTML=state.user?renderDashboard():renderAuth('login'); break;
        case 'marketplace': main.innerHTML=renderMarketplace(); break;
        case 'inventory': main.innerHTML=renderInventory(); break;
        case 'mylistings': main.innerHTML=renderMyListings(); break;
        case 'wallet': main.innerHTML=state.user?renderWallet():renderAuth('login'); break;
        case 'trades': main.innerHTML=state.user?renderTrades():renderAuth('login'); break;
        case 'profile': main.innerHTML=renderProfile(); break;
        default: main.innerHTML=renderHome();
    }
    renderNav();
}

function renderNav() {
    const links=document.getElementById('nav-links');
    const right=document.getElementById('nav-right');
    if(state.user) {
        links.innerHTML=`
            <span class="nav-link ${state.page==='marketplace'?'active':''}" onclick="navigate('marketplace')">Marketplace</span>
            <span class="nav-link ${state.page==='trades'?'active':''}" onclick="navigate('trades')">Trades</span>
            <span class="nav-link ${state.page==='wallet'?'active':''}" onclick="navigate('wallet')">Wallet</span>`;
        right.innerHTML=`
            <div class="flex items-center gap-2 bg-[var(--card)] border border-[var(--border)] rounded-lg px-3 py-1.5 cursor-pointer" onclick="navigate('wallet')">
                <i class="fas fa-coins text-xs" style="color:var(--accent)"></i>
                <span class="text-sm font-semibold">${formatCoins(state.user.balance)}</span>
            </div>
            <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold cursor-pointer" style="background:var(--accent-dim);color:var(--accent)" onclick="navigate('profile')">${state.user.username.charAt(0).toUpperCase()}</div>`;
    } else {
        links.innerHTML=`<span class="nav-link ${state.page==='marketplace'?'active':''}" onclick="navigate('marketplace')">Marketplace</span>`;
        right.innerHTML=`
            <button onclick="navigate('login')" class="btn-outline px-4 py-2 text-sm">Sign In</button>
            <button onclick="navigate('register')" class="btn-primary px-4 py-2 text-sm">Sign Up</button>`;
    }
}

/* ===== INIT ===== */
seedData();
/* Restore session */
const savedUser = (() => {
    try {
        const s = sessionStorage.getItem('lv_session');
        if(s) { const u = JSON.parse(s); const users = getStore('users'); return users.find(x=>x.id===u.id)||null; }
    } catch {}
    return null;
})();
if(savedUser) state.user = savedUser;

/* Save session on state change */
const origRender = render;
render = function() {
    if(state.user) sessionStorage.setItem('lv_session', JSON.stringify({id:state.user.id}));
    else sessionStorage.removeItem('lv_session');
    origRender();
};

render();

/* Chat polling for live updates */
setInterval(()=>{
    if(state.chatTradeId) renderChat();
},2000);
</script>

import {
    auth,
    createUserWithEmailAndPassword,

    signOut,
    onAuthStateChanged
} from "./firebase.js";

window.auth = auth;
window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
window.signInWithEmailAndPassword = signInWithEmailAndPassword;
window.signOut = signOut;
window.onAuthStateChanged = onAuthStateChanged;
</script></body>
